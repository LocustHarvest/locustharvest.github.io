<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Open Graph -->

<!-- Twitter Cards -->

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --gold-dim: #7A6330;
    --black: #0A0804; --dark: #110E07; --dark2: #1A1610; --dark3: #241F14;
    --ash: #6B6358; --mist: #AFA89E; --cream: #F0EBE0; --white: #FAF8F3;
  }
  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .thank-you-card {
    max-width: 600px;
    padding: 3rem 2rem;
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 8px;
  }
  .icon {
    font-size: 4rem;
    color: var(--gold);
    margin-bottom: 1.5rem;
    display: block;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 5vw, 3.5rem);
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  h1 em { font-style: italic; color: var(--gold); }
  p {
    font-size: 1.1rem;
    color: var(--mist);
    line-height: 1.7;
    margin: 1rem 0 2rem;
  }
  .btn-home {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 1rem 2.5rem;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-home:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
  }
  .gold-divider {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 1rem auto 1.5rem;
  }
  .small-note {
    font-size: 0.8rem;
    color: var(--ash);
    margin-top: 1.5rem;
  }
  @media (max-width: 640px) {
    .thank-you-card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="thank-you-card">
  <span class="icon">✓</span>
  <h1>Thank <em>You</em></h1>
  <div class="gold-divider"></div>
  <p>Your message has been sent successfully.<br>We'll get back to you within <strong>48 hours</strong>.</p>
  <a href="/" class="btn-home">← Back to Home</a>
  <p class="small-note">— Locust Harvest (Pty) Ltd</p>
</div>

</body>
</html>
